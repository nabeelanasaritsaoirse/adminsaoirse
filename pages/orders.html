<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Orders</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
      <div class="container-fluid">
        <button class="btn btn-dark" id="sidebarToggle">
          <i class="bi bi-list"></i>
        </button>

        <a class="navbar-brand ms-3" href="../index.html">
          <i class="bi bi-gear-fill"></i> Admin Panel
        </a>

        <ul class="navbar-nav ms-auto">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle"></i> Admin
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="profile.html">Profile</a></li>
              <li><hr class="dropdown-divider" /></li>
              <li><a class="dropdown-item logout-btn" href="#">Logout</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </nav>

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar"></div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="container-fluid">
        <div
          class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom"
        >
          <h1 class="h2">Orders Management</h1>
        </div>

        <!-- ========================= -->
        <!-- SUMMARY CARDS -->
        <!-- ========================= -->
        <div class="row mb-3">
          <div class="row mb-3">
            <div class="col-md-3 mb-2">
              <div class="card shadow-sm text-center">
                <div class="card-body">
                  <h6 class="text-muted mb-1">Total Orders</h6>
                  <h2 id="totalOrdersCount">0</h2>
                </div>
              </div>
            </div>

            <div class="col-md-3 mb-2">
              <div class="card shadow-sm text-center">
                <div class="card-body">
                  <h6 class="text-muted mb-1">Active Orders</h6>
                  <h2 id="activeOrdersCount">0</h2>
                </div>
              </div>
            </div>

            <div class="col-md-3 mb-2">
              <div class="card shadow-sm text-center">
                <div class="card-body">
                  <h6 class="text-muted mb-1">Completed Orders</h6>
                  <h2 id="completedOrdersCount">0</h2>
                </div>
              </div>
            </div>

            <div class="col-md-3 mb-2">
              <div class="card shadow-sm text-center">
                <div class="card-body">
                  <h6 class="text-muted mb-1">Cancelled Orders</h6>
                  <h2 id="cancelledOrdersCount">0</h2>
                </div>
              </div>
            </div>

            <div class="col-md-3 mb-2">
              <div class="card shadow-sm text-center">
                <div class="card-body">
                  <h6 class="text-muted mb-1">Pending Delivery</h6>
                  <h2 id="pendingDeliveryOrdersCount">0</h2>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- FILTER + SEARCH -->
        <div class="card shadow-sm mb-3">
          <div class="card-body d-flex flex-wrap gap-2 align-items-center">
            <!-- SEARCH -->
            <input
              type="text"
              id="orderSearchInput"
              class="form-control"
              style="max-width: 250px"
              placeholder="Search customer..."
            />

            <!-- STATUS -->
            <select
              id="orderStatusFilter"
              class="form-select"
              style="max-width: 180px"
            >
              <option value="ACTIVE">Active</option>
              <option value="COMPLETED">Completed</option>
              <option value="SOON">Completing Soon</option>
            </select>

            <!-- FROM DATE -->
            <input
              type="date"
              id="fromDate"
              class="form-control"
              style="max-width: 180px"
            />
            <!-- TO DATE -->
            <input
              type="date"
              id="toDate"
              class="form-control"
              style="max-width: 180px"
            />
            <!-- QUICK DATE PRESETS -->
            <div class="btn-group">
              <button class="btn btn-outline-secondary btn-sm" id="todayBtn">
                Today
              </button>
              <button
                class="btn btn-outline-secondary btn-sm"
                id="last7DaysBtn"
              >
                Last 7 Days
              </button>
              <button
                class="btn btn-outline-secondary btn-sm"
                id="clearDateBtn"
              >
                Clear
              </button>
            </div>
          </div>
        </div>

        <!-- SINGLE TABLE -->
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="mb-3">Orders</h5>

            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>OrderID</th>
                    <th>User</th>
                    <th>Product</th>
                    <th>Status</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="ordersTableBody"></tbody>
              </table>
            </div>

            <!-- SINGLE PAGINATION -->
            <div id="ordersPagination" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal fade" id="orderModal" tabindex="-1">
      <div
        class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable"
      >
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Order Details</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body" id="orderModalBody">Loading...</div>
        </div>
      </div>
    </div>

    <!-- JS FILES -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/navigation.js"></script>
    <script src="../assets/js/main.js"></script>

    <!-- ORDERS LOGIC -->
    <script src="../assets/js/orders.js"></script>

    <!-- LOGOUT -->
    <script>
      document.getElementById("logoutBtn")?.addEventListener("click", () => {
        localStorage.clear();
        window.location.href = "login.html";
      });
    </script>
  </body>
</html>
