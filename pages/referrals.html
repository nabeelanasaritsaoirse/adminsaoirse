<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Referral System</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
  </head>

  <body>
    <!-- CONFIG -->
    <script src="../assets/js/config.js"></script>

    <script>
      (function () {
        const REQUIRED_PERMISSION = "referrals";

        if (!AUTH.getToken() || !AUTH.isAuthenticated()) {
          alert("Please login first");
          window.location.href = "login.html";
          return;
        }

        if (!AUTH.hasModule(REQUIRED_PERMISSION)) {
          alert("Access Denied");
          window.location.href = "dashboard.html";
          return;
        }
      })();
    </script>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
      <div class="container-fluid">
        <button class="btn btn-dark" id="sidebarToggle">
          <i class="bi bi-list"></i>
        </button>

        <a class="navbar-brand ms-3" href="../index.html">
          <i class="bi bi-gear-fill"></i> Admin Panel
        </a>

        <ul class="navbar-nav ms-auto">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle"></i> Admin
            </a>

            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item logout-btn" href="#">Logout</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </nav>

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar"></div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="container-fluid">
        <!-- HEADER -->
        <div
          class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom"
        >
          <h1 class="h2">Referral System</h1>
        </div>

        <!-- 🔥 TOP 3 PODIUM -->
        <div class="row mb-4" id="topReferrers"></div>

        <!-- 🔥 LEADERBOARD CARD -->
        <div class="card shadow-sm mb-4">
          <!-- HEADER WITH SORT + SEARCH -->
          <div
            class="card-header d-flex justify-content-between align-items-center"
          >
            <h5>Leaderboard</h5>

            <div class="d-flex gap-2">
              <select id="sortSelect" class="form-select">
                <option value="referrals">Sort by Referrals</option>
                <option value="earnings">Sort by Earnings</option>
              </select>

              <input
                id="searchUser"
                class="form-control"
                placeholder="Search user"
              />
            </div>
          </div>

          <!-- 🔥 CHART -->
          <div class="card-body">
            <canvas id="referralChart" height="100"></canvas>
          </div>

          <!-- 🔥 TABLE -->
          <div class="card-body table-responsive">
            <table class="table table-hover">
              <thead>
                <tr>
                  <th>User</th>
                  <th>Total</th>
                  <th>Active</th>
                  <th>Earnings</th>
                  <th>Action</th>
                </tr>
              </thead>

              <tbody id="leaderboardTable">
                <tr>
                  <td colspan="5" class="text-center text-muted">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- 🔥 PAGINATION -->
          <div class="card-body">
            <div id="pagination"></div>
          </div>
        </div>

        <div class="card p-3 mt-4">
          <h5>Reward History</h5>

          <table class="table mt-3">
            <thead>
              <tr>
                <th>User</th>
                <th>Amount</th>
                <th>Type</th>
                <th>Title</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="rewardHistoryTable">
              <tr>
                <td colspan="5" class="text-center text-muted">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- USER DETAIL MODAL -->
        <div class="modal fade" id="userModal" tabindex="-1">
          <div class="modal-dialog modal-lg modal-dialog-centered">
            <div
              class="modal-content"
              style="max-height: 80vh; overflow: hidden"
            >
              <div class="modal-header">
                <h5 class="modal-title">User Detail</h5>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="modal"
                ></button>
              </div>

              <div
                class="modal-body"
                id="userDetailModal"
                style="overflow-y: auto"
              >
                Loading...
              </div>
            </div>
          </div>
        </div>

        <div class="modal fade" id="reassignModal" tabindex="-1">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Reassign Referrer</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
              </div>

              <div class="modal-body">
                <!-- 🔍 SEARCH -->
                <input
                  id="searchReferrer"
                  class="form-control mb-2"
                  placeholder="Search user..."
                />

                <!-- 🔽 DROPDOWN -->
                <select id="referrerDropdown" class="form-select mb-2">
                  <option value="">Select user</option>
                </select>

                <!-- 📝 REASON -->
                <input
                  id="reassignReason"
                  class="form-control mb-2"
                  placeholder="Reason (required)"
                />

                <div class="alert alert-warning">
                  ⚠️ Cannot change if user has active purchases
                </div>
              </div>

              <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                  Cancel
                </button>
                <button
                  id="reassignBtn"
                  class="btn btn-danger"
                  onclick="submitReassign()"
                >
                  Confirm
                </button>
              </div>
            </div>
          </div>
        </div>
        <!-- REWARD CONFIG -->
        <div class="card shadow-sm mb-4">
          <div class="card-header">Reward Config</div>
          <div class="card-body">
            <input
              id="target"
              class="form-control mb-2"
              placeholder="Target referrals"
            />

            <select id="rewardType" class="form-select mb-2">
              <option value="CASH">Cash</option>
              <option value="BADGE">Badge</option>
              <option value="BOTH">Both</option>
            </select>

            <input id="amount" class="form-control mb-2" placeholder="Amount" />

            <button
              id="saveConfigBtn"
              class="btn btn-success"
              onclick="updateRewardConfig()"
            >
              Save
            </button>
          </div>
        </div>

        <!-- MANUAL REWARD -->
        <div class="card shadow-sm">
          <div class="card-header">Manual Reward</div>

          <div class="card-body">
            <!-- 🔍 SEARCH USER -->
            <input
              id="rewardUserSearch"
              class="form-control mb-2"
              placeholder="Search user by name or email"
            />

            <!-- 🔽 USER DROPDOWN -->
            <select id="rewardUserId" class="form-select mb-2">
              <option value="">Select user</option>
            </select>

            <!-- 💰 AMOUNT -->
            <input
              id="rewardAmount"
              type="number"
              class="form-control mb-2"
              placeholder="Amount"
            />

            <!-- 🏷 TITLE -->
            <input
              id="rewardTitle"
              class="form-control mb-2"
              placeholder="Reward Title (e.g. Bonus, Promo)"
            />

            <!-- 🚀 BUTTON -->
            <button
              id="rewardBtn"
              class="btn btn-primary w-100"
              onclick="giveManualReward()"
            >
              Give Reward
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal fade" id="globalPopup" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-3">
          <div class="modal-body">
            <div
              id="popupIcon"
              style="font-size: 40px; margin-bottom: 10px"
            ></div>
            <h5 id="popupMessage"></h5>
          </div>

          <div class="modal-footer justify-content-center border-0">
            <button class="btn btn-primary" data-bs-dismiss="modal">OK</button>
          </div>
        </div>
      </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/navigation.js"></script>

    <!-- 🔥 IMPORTANT: ADD CHART.JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="../assets/js/referrals.js"></script>
  </body>
</html>
