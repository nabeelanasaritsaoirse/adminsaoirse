<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Admin Panel - Payment Intelligence</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
  </head>

  <body>
    <!-- ========================= -->
    <!-- AUTH GUARD -->
    <!-- ========================= -->
    <script src="../assets/js/config.js"></script>

    <script>
      (function () {
        if (!AUTH.isAuthenticated()) {
          alert("Please login first");
          window.location.href = "login.html";
          return;
        }

        if (!AUTH.isSuperAdmin() && !AUTH.hasModule(PERMISSIONS.ANALYTICS)) {
          alert("Access Denied");
          window.location.href = "welcome.html";
          return;
        }
      })();
    </script>

    <!-- ========================= -->
    <!-- NAVBAR -->
    <!-- ========================= -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
      <div class="container-fluid">
        <button class="btn btn-dark" id="sidebarToggle">
          <i class="bi bi-list"></i>
        </button>

        <a class="navbar-brand ms-3" href="dashboard.html">
          <i class="bi bi-gear-fill"></i>
          Admin Panel
        </a>

        <ul class="navbar-nav ms-auto">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle"></i>
              <span id="adminName">Admin</span>
            </a>

            <ul class="dropdown-menu dropdown-menu-end">
              <li>
                <a class="dropdown-item logout-btn" href="#">Logout</a>
              </li>
            </ul>
          </li>
        </ul>
      </div>
    </nav>

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar"></div>

    <!-- ========================= -->
    <!-- MAIN CONTENT -->
    <!-- ========================= -->
    <div class="main-content">
      <div class="container-fluid">
        <!-- HEADER -->
        <div
          class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom"
        >
          <h1 class="h2">
            <i class="bi bi-cash-stack"></i>
            Payment Intelligence
          </h1>
        </div>

        <!-- ========================= -->
        <!-- ANALYTICS CARDS -->
        <!-- ========================= -->
        <div class="row" id="analyticsCards">
          <div class="col-12 text-center text-muted">Loading analytics...</div>
        </div>

        <!-- ========================= -->
        <!-- FILTERS -->
        <!-- ========================= -->
        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-3">
                <input
                  type="text"
                  id="searchInput"
                  class="form-control"
                  placeholder="Search customer..."
                />
              </div>

              <div class="col-md-2">
                <select id="methodFilter" class="form-select">
                  <option value="">All Methods</option>
                  <option value="upi">UPI</option>
                  <option value="card">Card</option>
                  <option value="netbanking">Netbanking</option>
                  <option value="wallet">Wallet</option>
                  <option value="emi">EMI</option>
                </select>
              </div>

              <div class="col-md-2">
                <select id="statusFilter" class="form-select">
                  <option value="">All Status</option>
                  <option>COMPLETED</option>
                  <option>FAILED</option>
                  <option>PENDING</option>
                  <option>REFUNDED</option>
                  <option>CANCELLED</option>
                </select>
              </div>

              <div class="col-md-2">
                <input type="date" id="startDate" class="form-control" />
              </div>

              <div class="col-md-2">
                <input type="date" id="endDate" class="form-control" />
              </div>

              <div class="col-md-1">
                <button id="applyFiltersBtn" class="btn btn-primary w-100">
                  <i class="bi bi-search"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- ========================= -->
        <!-- TABS -->
        <!-- ========================= -->
        <ul class="nav nav-tabs mb-3">
          <li class="nav-item">
            <button
              class="nav-link active"
              data-bs-toggle="tab"
              data-bs-target="#paymentsTab"
            >
              Payments
            </button>
          </li>

          <li class="nav-item">
            <button
              class="nav-link"
              data-bs-toggle="tab"
              data-bs-target="#settlementsTab"
            >
              Settlements
            </button>
          </li>
        </ul>

        <div class="tab-content">
          <!-- ========================= -->
          <!-- PAYMENTS TAB -->
          <!-- ========================= -->
          <div class="tab-pane fade show active" id="paymentsTab">
            <div class="card shadow-sm">
              <div class="card-body table-responsive">
                <table class="table table-hover align-middle">
                  <thead>
                    <tr>
                      <th>Payment ID</th>
                      <th>Date</th>
                      <th>Customer</th>
                      <th>Order</th>
                      <th>Amount</th>
                      <th>Method</th>
                      <th>Status</th>
                      <th>Fee</th>
                      <th>Action</th>
                    </tr>
                  </thead>

                  <tbody id="paymentsTableBody">
                    <tr>
                      <td colspan="9" class="text-center text-muted">
                        Loading payments...
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

            <div id="paginationContainer" class="mt-3"></div>
          </div>

          <!-- ========================= -->
          <!-- SETTLEMENT TAB -->
          <!-- ========================= -->
          <div class="tab-pane fade" id="settlementsTab">
            <div class="card shadow-sm">
              <div class="card-body table-responsive">
                <table class="table table-hover">
                  <thead>
                    <tr>
                      <th>Settlement ID</th>
                      <th>Amount</th>
                      <th>Fees</th>
                      <th>Tax</th>
                      <th>Status</th>
                      <th>UTR</th>
                      <th>Date</th>
                    </tr>
                  </thead>

                  <tbody id="settlementTableBody">
                    <tr>
                      <td colspan="7" class="text-center text-muted">
                        Loading settlements...
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ========================= -->
    <!-- PAYMENT DETAIL MODAL -->
    <!-- ========================= -->
    <div class="modal fade" id="paymentDetailModal">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Payment Detail</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body" id="paymentDetailContent">Loading...</div>
        </div>
      </div>
    </div>
    <!-- ========================= -->
    <!-- REFUND MODAL -->
    <!-- ========================= -->
    <div class="modal fade" id="refundModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="bi bi-arrow-counterclockwise"></i>
              Initiate Refund
            </h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Refund Amount (₹)</label>
              <input
                type="number"
                id="refundAmount"
                class="form-control"
                placeholder="Leave empty for full refund"
              />
              <small id="maxRefundInfo" class="text-muted"></small>
            </div>

            <div class="mb-3">
              <label class="form-label">Reason</label>
              <textarea
                id="refundReason"
                class="form-control"
                rows="3"
                placeholder="Reason for refund"
              ></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Speed</label>
              <select id="refundSpeed" class="form-select">
                <option value="normal">Normal (5–7 days)</option>
                <option value="optimum">Instant (if available)</option>
              </select>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-danger" onclick="submitRefund()">
              Process Refund
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ========================= -->
    <!-- SCRIPTS -->
    <!-- ========================= -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../assets/js/navigation.js"></script>
    <script src="../assets/js/main.js"></script>

    <!-- PAYMENT LOGIC -->
    <script src="../assets/js/razorpay.js"></script>
  </body>
</html>
