<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Product Approval</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
  </head>

  <body>
    <script src="../assets/js/config.js"></script>

    <script>
      (function () {
        if (!AUTH.isAuthenticated()) {
          alert("Please login first");
          window.location.href = "login.html";
          return;
        }
      })();
    </script>

    <nav class="navbar navbar-dark bg-dark fixed-top">
      <div class="container-fluid">
        <button class="btn btn-dark" id="sidebarToggle">
          <i class="bi bi-list"></i>
        </button>

        <a class="navbar-brand ms-3">
          <i class="bi bi-gear-fill"></i> Admin Panel
        </a>
      </div>
    </nav>

    <div id="sidebar" class="sidebar"></div>

    <div class="main-content">
      <div class="container-fluid">
        <div class="pt-3 pb-2 mb-3 border-bottom">
          <h1 class="h2">Product Approval Queue</h1>
        </div>

        <div class="card shadow-sm mb-4">
          <div class="card-header d-flex justify-content-between">
            <h6 class="fw-bold text-primary">Seller Product Approvals</h6>

            <div>
              <select class="form-select" id="statusFilter">
                <option value="pending_approval">Pending</option>
                <option value="published">Approved</option>
                <option value="rejected">Rejected</option>
              </select>
            </div>
          </div>

          <div class="card-body table-responsive">
            <table class="table table-hover">
              <thead>
                <tr>
                  <th>
                    <input type="checkbox" id="selectAll" />
                  </th>

                  <th>Image</th>
                  <th>Product</th>
                  <th>Seller</th>
                  <th>Price</th>
                  <th>Status</th>
                  <th>Date</th>
                  <th>Actions</th>
                </tr>
              </thead>

              <tbody id="productsTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- PRODUCT PREVIEW MODAL -->

    <div class="modal fade" id="productPreviewModal">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Product Preview</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body" id="previewBody"></div>
        </div>
      </div>
    </div>

    <!-- REJECT MODAL -->

    <div class="modal fade" id="rejectModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Reject Product</h5>
          </div>

          <div class="modal-body">
            <textarea
              id="rejectReason"
              class="form-control"
              placeholder="Enter rejection reason"
            ></textarea>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>

            <button class="btn btn-danger" onclick="confirmReject()">
              Reject
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal fade" id="productViewModal">
      <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Product Review</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body" id="productViewBody">Loading...</div>

          <div class="modal-footer" id="productReviewActions"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../assets/js/navigation.js"></script>
    <script src="../assets/js/main.js"></script>

    <script src="../assets/js/product-approvals.js"></script>
  </body>
</html>
