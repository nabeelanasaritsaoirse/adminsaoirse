<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Database Backup</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
  </head>

  <body>
    <!-- ========================= -->
    <!-- AUTH GUARD (SUPER ADMIN) -->
    <!-- ========================= -->
    <script src="../assets/js/config.js"></script>

    <script>
      (function () {
        if (!AUTH.isAuthenticated()) {
          alert("Please login first");
          window.location.href = "login.html";
          return;
        }

        if (!AUTH.isSuperAdmin()) {
          alert("Access Denied. Super Admin Only.");
          window.location.href = "welcome.html";
          return;
        }
      })();
    </script>

    <!-- ========================= -->
    <!-- NAVBAR -->
    <!-- ========================= -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
      <div class="container-fluid">
        <button class="btn btn-dark" id="sidebarToggle">
          <i class="bi bi-list"></i>
        </button>

        <a class="navbar-brand ms-3" href="dashboard.html">
          <i class="bi bi-database-fill-gear"></i> Admin Panel
        </a>

        <ul class="navbar-nav ms-auto">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle"></i>
              Super Admin
            </a>

            <ul class="dropdown-menu dropdown-menu-end">
              <li>
                <a class="dropdown-item logout-btn" href="#">Logout</a>
              </li>
            </ul>
          </li>
        </ul>
      </div>
    </nav>

    <!-- ========================= -->
    <!-- SIDEBAR -->
    <!-- ========================= -->
    <div id="sidebar" class="sidebar"></div>

    <!-- ========================= -->
    <!-- MAIN CONTENT -->
    <!-- ========================= -->
    <div class="main-content">
      <div class="container-fluid">
        <!-- PAGE HEADER -->
        <div
          class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom"
        >
          <h1 class="h2">
            <i class="bi bi-cloud-arrow-down"></i>
            Database Backup Manager
          </h1>
        </div>

        <!-- ========================= -->
        <!-- BACKUP STATS -->
        <!-- ========================= -->
        <div class="row">
          <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-primary shadow-sm">
              <div class="card-body d-flex justify-content-between">
                <div>
                  <div class="text-xs fw-bold text-primary">Total Backups</div>
                  <div class="h5 fw-bold" id="totalBackups">0</div>
                </div>
                <i class="bi bi-archive fs-2 text-muted"></i>
              </div>
            </div>
          </div>

          <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-success shadow-sm">
              <div class="card-body d-flex justify-content-between">
                <div>
                  <div class="text-xs fw-bold text-success">
                    Latest Backup Size
                  </div>
                  <div class="h5 fw-bold" id="latestBackupSize">--</div>
                </div>
                <i class="bi bi-hdd-stack fs-2 text-muted"></i>
              </div>
            </div>
          </div>

          <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-warning shadow-sm">
              <div class="card-body d-flex justify-content-between">
                <div>
                  <div class="text-xs fw-bold text-warning">Last Backup</div>
                  <div class="h6 fw-bold" id="lastBackupTime">--</div>
                </div>
                <i class="bi bi-clock-history fs-2 text-muted"></i>
              </div>
            </div>
          </div>

          <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-info shadow-sm">
              <div class="card-body d-flex justify-content-between">
                <div>
                  <div class="text-xs fw-bold text-info">Auto Backup</div>
                  <div class="h6 fw-bold">Sunday 2:00 AM IST</div>
                </div>
                <i class="bi bi-cloud-check fs-2 text-muted"></i>
              </div>
            </div>
          </div>
        </div>

        <!-- ========================= -->
        <!-- ACTION BUTTONS -->
        <!-- ========================= -->
        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <div class="d-flex flex-wrap gap-3">
              <button id="downloadBackupBtn" class="btn btn-primary">
                <i class="bi bi-download"></i>
                Download Now
              </button>

              <button id="triggerBackupBtn" class="btn btn-success">
                <i class="bi bi-cloud-upload"></i>
                Save Backup to S3
              </button>

              <button id="refreshBackupBtn" class="btn btn-secondary">
                <i class="bi bi-arrow-repeat"></i>
                Refresh List
              </button>
            </div>

            <div class="mt-3">
              <strong id="backupStatus" class="text-muted"></strong>
            </div>
          </div>
        </div>

        <!-- ========================= -->
        <!-- BACKUP TABLE -->
        <!-- ========================= -->
        <div class="card shadow-sm mb-4">
          <div class="card-header">
            <h6 class="m-0 fw-bold text-primary">Saved Cloud Backups</h6>
          </div>

          <div class="card-body table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>Backup File</th>
                  <th>Size</th>
                  <th>Created At</th>
                  <th>Action</th>
                </tr>
              </thead>

              <tbody id="backupTableBody">
                <tr>
                  <td colspan="4" class="text-center text-muted">
                    Loading backups...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- ========================= -->
    <!-- SCRIPTS -->
    <!-- ========================= -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../assets/js/navigation.js"></script>
    <script src="../assets/js/main.js"></script>

    <!-- BACKUP LOGIC -->
    <script src="../assets/js/backup-manager.js"></script>
  </body>
</html>
