<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Reviews</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
  </head>

  <body>
    <!-- AUTH GUARD -->
    <script src="../assets/js/config.js"></script>
    <script>
      (function () {
        if (!AUTH.isAuthenticated()) {
          alert("Please login first");
          window.location.href = "login.html";
          return;
        }

        const user = AUTH.getCurrentUser();
        if (user.role !== "admin" && user.isSuperAdmin !== true) {
          alert("Access Denied");
          window.location.href = "welcome.html";
        }
      })();
    </script>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
      <div class="container-fluid">
        <button class="btn btn-dark" id="sidebarToggle">
          <i class="bi bi-list"></i>
        </button>
        <a class="navbar-brand ms-3" href="dashboard.html">
          <i class="bi bi-gear-fill"></i> Admin Panel
        </a>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle"></i> Admin
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item logout-btn" href="#">Logout</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </nav>

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar"></div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="container-fluid">
        <!-- PAGE HEADER -->
        <div
          class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom"
        >
          <h1 class="h2">Review Management</h1>
        </div>

        <!-- ===================== -->
        <!-- 🔵 REVIEW STATS -->
        <!-- ===================== -->
        <div class="row">
          <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-primary shadow-sm">
              <div class="card-body d-flex justify-content-between">
                <div>
                  <div class="text-xs fw-bold text-primary">Total Reviews</div>
                  <div class="h5 fw-bold" id="totalReviews">0</div>
                </div>
                <i class="bi bi-star fs-2 text-muted"></i>
              </div>
            </div>
          </div>

          <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-success shadow-sm">
              <div class="card-body d-flex justify-content-between">
                <div>
                  <div class="text-xs fw-bold text-success">Published</div>
                  <div class="h5 fw-bold" id="publishedReviews">0</div>
                </div>
                <i class="bi bi-check-circle fs-2 text-muted"></i>
              </div>
            </div>
          </div>

          <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-danger shadow-sm">
              <div class="card-body d-flex justify-content-between">
                <div>
                  <div class="text-xs fw-bold text-danger">Flagged</div>
                  <div class="h5 fw-bold" id="flaggedReviews">0</div>
                </div>
                <i class="bi bi-flag fs-2 text-muted"></i>
              </div>
            </div>
          </div>

          <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-warning shadow-sm">
              <div class="card-body d-flex justify-content-between">
                <div>
                  <div class="text-xs fw-bold text-warning">Avg Rating</div>
                  <div class="h5 fw-bold" id="averageRating">0</div>
                </div>
                <i class="bi bi-bar-chart fs-2 text-muted"></i>
              </div>
            </div>
          </div>
        </div>

        <!-- ===================== -->
        <!-- 🔵 REVIEWS TABLE -->
        <!-- ===================== -->
        <div class="card shadow-sm mb-4">
          <div class="card-header d-flex justify-content-between">
            <h6 class="m-0 fw-bold text-primary">All Reviews</h6>
            <select class="form-select w-auto" id="statusFilter">
              <option value="">All</option>
              <option value="published">Published</option>
              <option value="flagged">Flagged</option>
              <option value="unpublished">Unpublished</option>
            </select>
          </div>

          <div class="card-body table-responsive">
            <table class="table table-hover">
              <thead>
                <tr>
                  <th>User</th>
                  <th>Product</th>
                  <th>Rating</th>
                  <th>Status</th>
                  <th>Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="reviewsTable"></tbody>
            </table>
          </div>
          <div id="paginationContainer" class="mt-3"></div>
        </div>
      </div>
    </div>

    <!-- REVIEW DETAIL MODAL -->
    <div class="modal fade" id="reviewModal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Review Details</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="reviewModalBody">Loading...</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/navigation.js"></script>
    <script src="../assets/js/main.js"></script>

    <script src="../assets/js/reviews.js"></script>
  </body>
</html>
